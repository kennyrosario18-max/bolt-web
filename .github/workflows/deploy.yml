name: CI & Deploy

# Gate de calidad + deploy automático a producción (boltgolfcars.com).
# Reemplaza el push manual: cada commit a main pasa typecheck + lint + checks de
# contenido + build; solo si todo verde, publica a gh-pages. Elimina el bus-factor
# y el riesgo de publicar un build roto.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck (TypeScript estricto)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      # F9 · capa 1 — tests unitarios (precios, i18n, pares de contenido ES/EN).
      - name: Tests unitarios (Vitest)
        run: npm test

      # `npm run build` corre el gate de contenido (prebuild → check-content.mjs)
      # y luego next build. Sin BASE_PATH = build de producción, indexable.
      - name: Build de producción (+ gate de contenido)
        run: npm run build

      # F9 · capa 2 — build final íntegro: h1 único, 0 __next_f, enlaces
      # internos y hreflang sin romper, canonicals presentes.
      - name: Validar HTML y enlaces del build
        run: npm run check:html

      # F9 · capa 3 — E2E de los shims vanilla + axe WCAG AA sobre out/.
      # channel:"chrome" usa el Chrome preinstalado del runner (sin descarga).
      - name: Tests E2E + accesibilidad (Playwright + axe)
        run: npm run test:e2e

      # F9 · capa 4 — Lighthouse móvil sobre el build (Perf ≥85 anti-ruido de
      # runner; la regla de producción ≥90 se valida en mediciones reales).
      - name: Gate de Lighthouse
        run: npm run lh:gate

      - name: CNAME y .nojekyll
        run: |
          echo "boltgolfcars.com" > out/CNAME
          touch out/.nojekyll

      # Deploy solo en push a main; en pull_request queda como verificación.
      - name: Deploy a gh-pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          cname: boltgolfcars.com
          commit_message: "Deploy ${{ github.sha }}"
